services:
  # ── API Web Service ──────────────────────────────────────────────────────────
  - type: web
    name: xperise-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_GROUP_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

  # ── Telegram Bot Background Worker ───────────────────────────────────────────
  # type: worker — no port binding required, Render won't scan for open ports
  - type: worker
    name: xperise-bot
    runtime: docker
    dockerfilePath: ./apps/telegram/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_GROUP_CHAT_ID
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: API_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
